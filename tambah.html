<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tambah tanaman</title>
  
    <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
      <h1>form tambah tanaman</h1>

      <form id="formTambah">
        <label>nama tanaman</label>
        <input type="text" id="namatanaman" />

        <label>warna</label>
        <input type="text" id="warna">

       <label>jenis</label>
        <select id="jenis">
          <option value="perdu">Perdu</option>
          <option value="kayu">Kayu</option>
          <option value="herbal">herbal</option>
        </select>

      <a href="daftar.html">daftar tanaman</a>
    </div>
    
    <script type="module">
      import { tambahtanaman } from './main.js'

      // mengirimkan data film dari form
      const formTambah = document.getElementById('formTambah')

      // event ketika form disubmit (dikirim)
      formTambah.addEventListener('submit', function (e) {
        // mencegah reload halaman
        e.preventDefault()

        // eksekusi fungsi tambah data film
        tambahtanaman()
      })
    </script>
</body>

</html>
